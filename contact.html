<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="media.css">

  
</head>

<body>

    <header>
        <h1>Contact Us</h1>
        <p>Get in touch with us to start your training</p>
    </header>

    <div class="container">

        <div class="box">
            <h2>Send Us a Message</h2>

            <form>
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="text" name="subject" placeholder="Subject">
                <textarea name="message" placeholder="Your Message" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </div>

        
        <div class="box">
            <h2>Our Location</h2>

            <iframe 
                src="https://www.google.com/maps?q=1234+Home+Run+Drive+Lakeland+FL&output=embed"
                loading="lazy">
            </iframe>
        </div>

        <div class="full-width">
            <h3>Visit Us</h3>
            <p>1234 Home Run Drive, Lakeland, FL 33801</p>
            <p>Email: info@baseballtraining.com | Phone: (863) 555-1234</p>
        </div>

    </div>

</body>
</html>
